services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aggregator
      POSTGRES_PASSWORD: aggregator
      POSTGRES_DB: aggregator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://aggregator:aggregator@db:5432/aggregator
      PROVIDER_BASE_URL: http://events-provider.dev-2.python-labs.ru
      PROVIDER_API_KEY: "${PROVIDER_API_KEY}"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_started

volumes:
  pgdata:
